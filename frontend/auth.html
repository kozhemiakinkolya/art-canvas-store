<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Авторизація | ArtCanvas</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-800 flex flex-col min-h-screen">

  <header class="bg-white shadow-md sticky top-0 z-50">
    <div class="container mx-auto px-6 py-4 flex justify-between items-center">
      <a href="index.html" class="text-2xl font-bold text-indigo-600 tracking-wide">ArtCanvas</a>
      <nav class="hidden md:flex space-x-8 font-medium">
        <a href="index.html">Головна</a>
        <a href="gallery.html">Галерея</a>
        <a href="custom-order.html">Замовити по foto</a>
        <a href="editor.html">Онлайн-Редактор</a>
        <a href="admin.html">Адмінка</a>
      </nav>
      <div id="auth-zone">
        <a href="auth.html" class="bg-indigo-600 text-white px-5 py-2 rounded-full hover:bg-indigo-700 transition shadow">Увійти</a>
      </div>
    </div>
  </header>

  <main class="flex-grow flex items-center justify-center container mx-auto px-6 py-12">
    <div class="bg-white rounded-2xl shadow-xl w-full max-w-md overflow-hidden border border-gray-100 p-8">
      
      <div id="login-box" class="space-y-6">
        <div class="text-center">
          <h2 class="text-3xl font-extrabold text-gray-900">З поверненням!</h2>
          <p class="text-gray-500 mt-1">Увійдіть у свій акаунт клієнта</p>
        </div>
        <form id="form-login" class="space-y-4">
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1">Електронна пошта</label>
            <input type="email" id="login-email" required placeholder="name@example.com" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none">
          </div>
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1">Пароль</label>
            <input type="password" id="login-password" required placeholder="••••••••" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none">
          </div>
          <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3.5 rounded-xl transition shadow-md">Увійти</button>
        </form>
        <p class="text-center text-sm text-gray-600">Немає акаунту? <button id="to-register" class="text-indigo-600 font-bold hover:underline ml-1">Створити акаунт</button></p>
      </div>

      <div id="register-box" class="space-y-6 hidden">
        <div class="text-center">
          <h2 class="text-3xl font-extrabold text-gray-900">Реєстрація</h2>
          <p class="text-gray-500 mt-1">Створіть профіль покупця</p>
        </div>
        <form id="form-register" class="space-y-4">
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1">Ваше ім'я</label>
            <input type="text" id="register-name" required placeholder="Олександр" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none">
          </div>
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1">Електронна пошта</label>
            <input type="email" id="register-email" required placeholder="name@example.com" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none">
          </div>
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1">Пароль</label>
            <input type="password" id="register-password" required placeholder="Мінімум 6 символів" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none">
          </div>
          <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3.5 rounded-xl transition shadow-md">Зареєструватися</button>
        </form>
        <p class="text-center text-sm text-gray-600">Вже є профіль? <button id="to-login" class="text-indigo-600 font-bold hover:underline ml-1">Увійти</button></p>
      </div>

    </div>
  </main>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const loginBox = document.getElementById("login-box");
      const registerBox = document.getElementById("register-box");
      
      document.getElementById("to-register").addEventListener("click", () => { loginBox.classList.add("hidden"); registerBox.classList.remove("hidden"); });
      document.getElementById("to-login").addEventListener("click", () => { registerBox.classList.add("hidden"); loginBox.classList.remove("hidden"); });

      // Запит реєстрації
      document.getElementById("form-register").addEventListener("submit", async (e) => {
        e.preventDefault();
        const name = document.getElementById("register-name").value.trim();
        const email = document.getElementById("register-email").value.trim();
        const password = document.getElementById("register-password").value;

        try {
          const response = await fetch("/api/auth/register", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ name, email, password })
          });
          const data = await response.json();
          if (response.ok) {
            localStorage.setItem("token", data.token);
            localStorage.setItem("user", JSON.stringify(data.user));
            alert("🎉 Реєстрація успішна!");
            window.location.href = "index.html";
          } else { alert(data.msg || "Помилка"); }
        } catch (err) { alert("Помилка зв'язку."); }
      });

      // Запит входу
      document.getElementById("form-login").addEventListener("submit", async (e) => {
        e.preventDefault();
        const email = document.getElementById("login-email").value.trim();
        const password = document.getElementById("login-password").value;

        try {
          const response = await fetch("/api/auth/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email, password })
          });
          const data = await response.json();
          if (response.ok) {
            localStorage.setItem("token", data.token);
            localStorage.setItem("user", JSON.stringify(data.user));
            alert("👋 З поверненням!");
            window.location.href = "index.html";
          } else { alert(data.msg || "Помилка авторизації"); }
        } catch (err) { alert("Сервер недоступний."); }
      });
    });
  </script>
  <script src="navbar.js"></script>
</body>
</html>
