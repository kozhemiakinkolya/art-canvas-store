<!DOCTYPE html>
<html lang="uk">
<head>

  <title>Авторизація | ArtCanvas</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-800 flex flex-col min-h-screen">

  <header class="bg-white shadow-md sticky top-0 z-50">
    <div class="container mx-auto px-6 py-4 flex justify-between items-center">
      <a href="index.html" class="text-2xl font-bold text-indigo-600 tracking-wide">ArtCanvas</a>
      <nav class="hidden md:flex space-x-8 font-medium">
        <a href="index.html" class="text-gray-600 hover:text-indigo-600 transition">Головна</a>
        <a href="gallery.html" class="text-gray-600 hover:text-indigo-600 transition">Галерея</a>
        <a href="custom-order.html" class="text-gray-600 hover:text-indigo-600 transition">Замовити по фото</a>
        <a href="editor.html" class="text-gray-600 hover:text-indigo-600 transition">Онлайн-Редактор</a>
        <a href="about.html" class="text-gray-600 hover:text-indigo-600 transition">Про автора</a>
      </nav>
      <div id="auth-zone" class="flex items-center space-x-4">
        <a href="auth.html" class="bg-indigo-600 text-white px-5 py-2 rounded-full hover:bg-indigo-700 transition shadow">Увійти</a>
      </div>
    </div>
  </header>

  <main class="flex-grow flex items-center justify-center container mx-auto px-6 py-12">
    <div class="bg-white rounded-2xl shadow-xl w-full max-w-md overflow-hidden border border-gray-100 p-8">
      
      <div id="login-box" class="space-y-6">
        <div class="text-center">
          <h2 class="text-3xl font-extrabold text-gray-900">Раді знову бачити!</h2>
          <p class="text-gray-500 mt-1">Увійдіть у свій акаунт для замовлення картин</p>
        </div>

        <form id="form-login" class="space-y-4">
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1">Електронна пошта</label>
            <input type="email" id="login-email" required placeholder="name@example.com" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none transition">
          </div>
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1">Пароль</label>
            <input type="password" id="login-password" required placeholder="••••••••" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none transition">
          </div>
          <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo
