<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Авторизація | ArtCanvas</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-800 flex flex-col min-h-screen">

  <header class="bg-white shadow-md sticky top-0 z-50">
    <div class="container mx-auto px-6 py-4 flex justify-between items-center">
      <a href="index.html" class="text-2xl font-bold text-indigo-600 tracking-wide">ArtCanvas</a>
      <nav class="hidden md:flex space-x-8 font-medium">
        <a href="index.html" class="text-gray-600 hover:text-indigo-600 transition">Головна</a>
        <a href="gallery.html" class="text-gray-600 hover:text-indigo-600 transition">Галерея</a>
        <a href="custom-order.html" class="text-gray-600 hover:text-indigo-600 transition">Замовити по foto</a>
        <a href="editor.html" class="text-gray-600 hover:text-indigo-600 transition">Онлайн-Редактор</a>
        <a href="admin.html" class="text-gray-600 hover:text-indigo-600 transition">Адмінка</a>
      </nav>
      <div id="auth-zone">
        <a href="auth.html" class="bg-indigo-600 text-white px-5 py-2 rounded-full hover:bg-indigo-700 transition shadow">Увійти</a>
      </div>
    </div>
  </header>

  <main class="flex-grow flex items-center justify-center container mx-auto px-6 py-12">
    <div class="bg-white rounded-2xl shadow-xl w-full max-w-md overflow-hidden border border-gray-100 p-8">
      
      <div id="login-box" class="space-y-6">
        <div class="text-center">
          <h2 class="text-3xl font-extrabold text-gray-900">Раді знову бачити!</h2>
          <p class="text-gray-500 mt-1">Увійдіть у свій акаунт</p>
        </div>

        <form id="form-login" class="space-y-4">
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1">Електронна пошта</label>
            <input type="email" id="login-email" required placeholder="name@example.com" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none transition">
          </div>
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1">Пароль</label>
            <input type="password" id="login-password" required placeholder="••••••••" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none transition">
          </div>
          <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3.5 rounded-xl transition shadow-md">
            Увійти
          </button>
        </form>

        <p class="text-center text-sm text-gray-600">
          Ще немає акаунту? 
          <button id="to-register" class="text-indigo-600 font-bold hover:underline ml-1">Створити акаунт</button>
        </p>
      </div>

      <div id="register-box" class="space-y-6 hidden">
        <div class="text-center">
          <h2 class="text-3xl font-extrabold text-gray-900">Створення акаунту</h2>
          <p class="text-gray-500 mt-1">Зареєструйтесь для покупок</p>
        </div>

        <form id="form-register" class="space-y-4">
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1">Ваше ім'я</label>
            <input type="text" id="register-name" required placeholder="Іван Іванов" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none transition">
          </div>
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1">Електронна пошта</label>
            <input type="email" id="register-email" required placeholder="name@example.com" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none transition">
          </div>
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1">Придумайте пароль</label>
            <input type="password" id="register-password" required placeholder="Мінімум 6 символів" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none transition">
          </div>
          <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3.5 rounded-xl transition shadow-md">
            Зареєструватися
          </button>
        </form>

        <p class="text-center text-sm text-gray-600">
          Вже маєте акаунт? 
          <button id="to-login" class="text-indigo-600 font-bold hover:underline ml-1">Увійти</button>
        </p>
      </div>

    </div>
  </main>

  <footer class="bg-gray-900 text-gray-400 text-center py-6 border-t border-gray-800">
    <p>&copy; 2026 ArtCanvas Store. Всі права захищені.</p>
  </footer>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const loginBox = document.getElementById("login-box");
      const registerBox = document.getElementById("register-box");
      const toRegisterBtn = document.getElementById("to-register");
      const toLoginBtn = document.getElementById("to-login");

      const formLogin = document.getElementById("form-login");
      const formRegister = document.getElementById("form-register");

      // 1. ПЕРЕМИКАННЯ ФОРМ
      if (toRegisterBtn && toLoginBtn) {
        toRegisterBtn.addEventListener("click", () => {
          loginBox.classList.add("hidden");
          registerBox.classList.remove("hidden");
        });
        toLoginBtn.addEventListener("click", () => {
          registerBox.classList.add("hidden");
          loginBox.classList.remove("hidden");
        });
      }

      // 2. ОБРОБКА РЕЄСТРАЦІЇ
      if (formRegister) {
        formRegister.addEventListener("submit", async (e) => {
          e.preventDefault();

          const name = document.getElementById("register-name").value.trim();
          const email = document.getElementById("register-email").value.trim();
          const password = document.getElementById("register-password").value;

          try {
            // Використовуємо відносний шлях без localhost
            const response = await fetch("/api/auth/register", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ name, email, password })
            });

            const data = await response.json();

            if (response.ok) {
              localStorage.setItem("token", data.token);
              localStorage.setItem("user", JSON.stringify(data.user));
              alert(`🎉 Реєстрація успішна! Вітаємо, ${data.user.name}.`);
              window.location.href = "index.html"; // Перехід на головну сторінку
            } else {
              alert(data.msg || "Помилка реєстрації");
            }
          } catch (err) {
            console.error(err);
            alert("Не вдалося з'єднатися з сервером Railway.");
          }
        });
      }

      // 3. ОБРОБКА ВХОДУ (ЛОГІНУ)
      if (formLogin) {
        formLogin.addEventListener("submit", async (e) => {
          e.preventDefault();

          const email = document.getElementById("login-email").value.trim();
          const password = document.getElementById("login-password").value;

          try {
            const response = await fetch("/api/auth/login", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ email, password })
            });

            const data = await response.json();

            if (response.ok) {
              localStorage.setItem("token", data.token);
              localStorage.setItem("user", JSON.stringify(data.user));
              alert(`👋 З поверненням, ${data.user.name}!`);
              window.location.href = "index.html";
            } else {
              alert(data.msg || "Неправильний Email або пароль");
            }
          } catch (err) {
            console.error(err);
            alert("Не вдалося з'єднатися з сервером.");
          }
        });
      }
    });
  </script>
</body>
</html>
