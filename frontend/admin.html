<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Панель адміністратора | ArtCanvas</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-800 flex flex-col min-h-screen">

  <header class="bg-white shadow-md">
    <div class="container mx-auto px-6 py-4 flex justify-between items-center">
      <a href="index.html" class="text-2xl font-bold text-indigo-600 tracking-wide">ArtCanvas <span class="text-xs bg-red-100 text-red-600 px-2 py-1 rounded ml-1">Admin</span></a>
      <nav class="space-x-6 font-medium">
        <a href="index.html">На головну сайту</a>
        <a href="gallery.html">Перейти в Галерею</a>
      </nav>
    </div>
  </header>

  <div id="admin-login-zone" class="flex-grow flex items-center justify-center p-6">
    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border border-gray-100">
      <div class="text-center mb-6">
        <h2 class="text-2xl font-black text-gray-900">Вхід в панель модератора</h2>
        <p class="text-sm text-gray-500 mt-1">Тільки для персоналу</p>
      </div>
      <form id="form-admin-login" class="space-y-4">
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1">Логін</label>
          <input type="text" id="admin-username" required class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl outline-none">
        </div>
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1">Пароль</label>
          <input type="password" id="admin-password" required class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl outline-none">
        </div>
        <button type="submit" class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-3 rounded-xl transition shadow">Увійти</button>
      </form>
    </div>
  </div>

  <main id="admin-content-zone" class="container mx-auto px-6 py-12 flex-grow hidden">
    <div class="max-w-3xl mx-auto bg-white rounded-3xl shadow-xl overflow-hidden border border-gray-100">
      <div class="bg-indigo-900 text-white p-8 flex justify-between items-center">
        <div>
          <h1 class="text-3xl font-black">Управління каталогом ArtCanvas</h1>
        </div>
        <button id="btn-admin-logout" class="bg-red-600 hover:bg-red-700 text-white text-xs font-bold px-4 py-2 rounded-xl transition">ВИЙТИ</button>
      </div>

      <form id="form-add-painting" class="p-8 space-y-6">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div>
            <label class="block text-sm font-bold text-gray-700 mb-2">Назва картини</label>
            <input type="text" id="title" required class="w-full p-3.5 bg-gray-50 border border-gray-200 rounded-xl outline-none">
          </div>
          <div>
            <label class="block text-sm font-bold text-gray-700 mb-2">Ціна (грн)</label>
            <input type="number" id="price" required class="w-full p-3.5 bg-gray-50 border border-gray-200 rounded-xl outline-none">
          </div>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
          <div>
            <label class="block text-sm font-bold text-gray-700 mb-2">Категорія</label>
            <input type="text" id="category" class="w-full p-3.5 bg-gray-50 border border-gray-200 rounded-xl">
          </div>
          <div>
            <label class="block text-sm font-bold text-gray-700 mb-2">Техніка</label>
            <input type="text" id="technique" class="w-full p-3.5 bg-gray-50 border border-gray-200 rounded-xl">
          </div>
          <div>
            <label class="block text-sm font-bold text-gray-700 mb-2">Розмір</label>
            <input type="text" id="size" class="w-full p-3.5 bg-gray-50 border border-gray-200 rounded-xl">
          </div>
        </div>
        <div>
          <label class="block text-sm font-bold text-gray-700 mb-2">🔗 Посилання на зображення (URL)</label>
          <input type="url" id="imageUrl" required class="w-full p-3.5 bg-gray-50 border border-gray-200 rounded-xl text-indigo-600 font-mono text-sm">
        </div>
        <div>
          <label class="block text-sm font-bold text-gray-700 mb-2">Опис твору</label>
          <textarea id="description" rows="3" class="w-full p-3.5 bg-gray-50 border border-gray-200 rounded-xl"></textarea>
        </div>
        <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-xl transition shadow-lg">➕ Опублікувати картину в галерею</button>
      </form>
    </div>
  </main>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const loginZone = document.getElementById("admin-login-zone");
      const contentZone = document.getElementById("admin-content-zone");

      const checkAuth = () => {
        if (localStorage.getItem("adminToken")) { loginZone.classList.add("hidden"); contentZone.classList.remove("hidden"); }
        else { loginZone.classList.remove("hidden"); contentZone.classList.add("hidden"); }
      };
      checkAuth();

      document.getElementById("form-admin-login").addEventListener("submit", async (e) => {
        e.preventDefault();
        const login = document.getElementById("admin-username").value.trim();
        const password = document.getElementById("admin-password").value;

        const response = await fetch("/api/auth/admin-login", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ login, password }) });
        const data = await response.json();
        if (response.ok) { localStorage.setItem("adminToken", data.token); checkAuth(); }
        else alert(data.msg);
      });

      document.getElementById("form-add-painting").addEventListener("submit", async (e) => {
        e.preventDefault();
        const token = localStorage.getItem("adminToken");
        const bodyData = {
          title: document.getElementById("title").value.trim(),
          price: document.getElementById("price").value,
          category: document.getElementById("category").value.trim(),
          technique: document.getElementById("technique").value.trim(),
          size: document.getElementById("size").value.trim(),
          description: document.getElementById("description").value.trim(),
          imageUrl: document.getElementById("imageUrl").value.trim()
        };

        const response = await fetch("/api/paintings/add", { method: "POST", headers: { "Content-Type": "application/json", "Authorization": `Bearer ${token}` }, body: JSON.stringify(bodyData) });
        const data = await response.json();
        if (response.ok) { alert(data.msg); document.getElementById("form-add-painting").reset(); }
        else alert(data.msg);
      });

      document.getElementById("btn-admin-logout").addEventListener("click", () => { localStorage.removeItem("adminToken"); checkAuth(); });
    });
  </script>
</body>
</html>
