<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Панель художника | Додати картину</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen flex flex-col">

  <header class="bg-white shadow-sm py-4 px-6">
    <div class="container mx-auto flex justify-between items-center">
      <a href="index.html" class="text-xl font-bold text-indigo-600">ArtCanvas Admin</a>
      <a href="gallery.html" class="text-sm text-gray-600 hover:text-indigo-600">Переглянути галерею &rarr;</a>
    </div>
  </header>

  <main class="flex-grow flex items-center justify-center container mx-auto px-4 py-12">
    <div class="bg-white rounded-2xl shadow-lg p-8 w-full max-w-xl border border-gray-100">
      <h2 class="text-2xl font-black text-gray-900 mb-2">Додати нову картину на продаж</h2>
      <p class="text-sm text-gray-500 mb-6">Заповніть картку товару, щоб вона миттєво з'явилася в загальному каталозі.</p>

      <form id="form-add-painting" class="space-y-4">
        <div>
          <label class="block text-xs font-bold uppercase text-gray-600 mb-1">Назва картини</label>
          <input type="text" id="p-title" required placeholder="Наприклад: Ранковий туман" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500">
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-xs font-bold uppercase text-gray-600 mb-1">Ціна (грн)</label>
            <input type="number" id="p-price" required placeholder="3000" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500">
          </div>
          <div>
            <label class="block text-xs font-bold uppercase text-gray-600 mb-1">Категорія</label>
            <select id="p-category" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500">
              <option value="Пейзаж">Пейзаж</option>
              <option value="Портрет">Портрет</option>
              <option value="Абстракція">Абстракція</option>
              <option value="Натюрморт">Натюрморт</option>
            </select>
          </div>
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-xs font-bold uppercase text-gray-600 mb-1">Техніка виконання</label>
            <input type="text" id="p-technique" required placeholder="Олія, полотно" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500">
          </div>
          <div>
            <label class="block text-xs font-bold uppercase text-gray-600 mb-1">Розмір картини</label>
            <input type="text" id="p-size" required placeholder="40х60 см" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500">
          </div>
        </div>

        <div>
          <label class="block text-xs font-bold uppercase text-gray-600 mb-1">Опис твору</label>
          <textarea id="p-description" rows="3" placeholder="Розкажіть історію створення картини..." class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500"></textarea>
        </div>

        <div>
          <label class="block text-xs font-bold uppercase text-gray-600 mb-1">Фотографія картини</label>
          <input type="file" id="p-file" required accept="image/*" class="w-full text-sm text-gray-500 file:mr-4 file:py-2.5 file:px-4 file:rounded-xl file:border-0 file:text-sm file:font-semibold file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100">
        </div>

        <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3.5 rounded-xl transition shadow-md mt-4">
          Опублікувати в галереї
        </button>
      </form>
    </div>
  </main>

  <script>
    document.getElementById('form-add-painting').addEventListener('submit', async (e) => {
      e.preventDefault();

      const formData = new FormData();
      formData.append('title', document.getElementById('p-title').value.trim());
      formData.append('price', document.getElementById('p-price').value);
      formData.append('category', document.getElementById('p-category').value);
      formData.append('technique', document.getElementById('p-technique').value.trim());
      formData.append('size', document.getElementById('p-size').value.trim());
      formData.append('description', document.getElementById('p-description').value.trim());
      formData.append('image', document.getElementById('p-file').files[0]);

      try {
        const response = await fetch('/api/paintings/add', {
          method: 'POST',
          body: formData
          // Headers не потрібні, браузер сам виставить multipart/form-data
        });

        const data = await response.json();
        if (response.ok) {
          alert(data.msg);
          document.getElementById('form-add-painting').reset();
        } else {
          alert(data.msg || 'Помилка завантаження.');
        }
      } catch (err) {
        console.error(err);
        alert('Не вдалося з’єднатися із сервером.');
      }
    });
  </script>
</body>
</html>
