<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Панель адміністратора | CRM</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-800 flex flex-col min-h-screen">

  <header class="bg-white shadow-md">
    <div class="container mx-auto px-6 py-4 flex justify-between items-center">
      <a href="index.html" class="text-2xl font-bold text-indigo-600 tracking-wide">ArtCanvas <span class="text-xs bg-red-100 text-red-600 px-2 py-1 rounded ml-1">Admin</span></a>
      <a href="index.html" class="text-gray-600 hover:text-indigo-600 font-medium">На головну</a>
    </div>
  </header>

  <div id="admin-login-zone" class="flex-grow flex items-center justify-center p-6">
    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border">
      <h2 class="text-2xl font-black text-center mb-6">Вхід для адміністратора</h2>
      <form id="form-admin-login" class="space-y-4">
        <input type="text" id="admin-username" placeholder="Логін" required class="w-full p-3 bg-gray-50 border rounded-xl outline-none">
        <input type="password" id="admin-password" placeholder="Пароль" required class="w-full p-3 bg-gray-50 border rounded-xl outline-none">
        <button type="submit" class="w-full bg-red-600 text-white font-bold py-3 rounded-xl shadow">Авторизуватись в CRM</button>
      </form>
    </div>
  </div>

  <main id="admin-content-zone" class="container mx-auto px-6 py-12 flex-grow hidden space-y-12">
    <div class="bg-indigo-900 text-white p-6 rounded-3xl shadow flex justify-between items-center">
      <div>
        <h1 class="text-2xl font-black">Панель модератора ArtCanvas</h1>
        <p class="text-indigo-200 text-xs mt-1">Перегляд замовлень та додавання нових позицій</p>
      </div>
      <button id="btn-admin-logout" class="bg-red-600 text-xs font-bold px-4 py-2 rounded-xl text-white">ВИЙТИ</button>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
      
      <div class="lg:col-span-2 bg-white p-6 rounded-3xl shadow border">
        <h2 class="text-xl font-black mb-6">📥 Сповіщення про нові замовлення (<span id="orders-count">0</span>)</h2>
        <div id="orders-list" class="space-y-4 max-h-[650px] overflow-y-auto pr-2">
          <p class="text-gray-400">Синхронізація з сервером...</p>
        </div>
      </div>

      <div class="bg-white p-6 rounded-3xl shadow border h-fit">
        <h2 class="text-xl font-black mb-6">➕ Опублікувати картину</h2>
        <form id="form-add-painting" class="space-y-4">
          <input type="text" id="title" placeholder="Назва роботи" required class="w-full p-3 bg-gray-50 border rounded-xl outline-none text-sm">
          <input type="number" id="price" placeholder="Ціна (грн)" required class="w-full p-3 bg-gray-50 border rounded-xl outline-none text-sm">
          <input type="url" id="imageUrl" placeholder="Посилання на картинку картини" required class="w-full p-3 bg-gray-50 border rounded-xl outline-none text-xs font-mono">
          <textarea id="description" placeholder="Опис" rows="2" class="w-full p-3 bg-gray-50 border rounded-xl text-sm outline-none"></textarea>
          <button type="submit" class="w-full bg-indigo-600 text-white font-bold py-3 rounded-xl text-sm shadow">Додати на сайт</button>
        </form>
      </div>

    </div>
  </main>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const loginZone = document.getElementById("admin-login-zone");
      const contentZone = document.getElementById("admin-content-zone");
      const ordersList = document.getElementById("orders-list");
      const ordersCount = document.getElementById("orders-count");

      const checkAuth = async () => {
        const token = localStorage.getItem("adminToken");
        if (token) {
          loginZone.classList.add("hidden");
          contentZone.classList.remove("hidden");
          await loadOrders();
        } else {
          loginZone.classList.remove("hidden");
          contentZone.classList.add("hidden");
        }
      };

      const loadOrders = async () => {
        const token = localStorage.getItem("adminToken");
        try {
          const response = await fetch("/api/admin/orders", { headers: { "Authorization": `Bearer ${token}` } });
          const orders = await response.json();
          if (response.ok) {
            ordersCount.innerText = orders.length;
            ordersList.innerHTML = orders.length === 0 ? `<p class="text-gray-400 py-6 text-center">Замовлень немає.</p>` : "";

            orders.reverse().forEach(order => {
              const card = document.createElement("div");
              card.className = "p-5 bg-gray-50 rounded-2xl border space-y-3";
              
              let itemsHtml = order.items.map(i => `• ${i.title} (${i.price} грн)`).join("<br>") || `Тип замовлення: ${order.orderType === 'by_photo' ? '📸 За власним фото' : '🎨 Конструктор макетів'}`;
              
              // Відображення посилання на фото, якщо клієнт його завантажив
              let imageLinkHtml = order.customImage ? `<p class="text-[11px] pt-1">🖼️ <b>Файл:</b> <a href="${order.customImage}" target="_blank" class="text-indigo-600 font-bold underline hover:text-indigo-800">Переглянути завантажене фото</a></p>` : '';

              const statusColors = { pending: 'bg-yellow-50 text-yellow-600 border-yellow-200', processing: 'bg-blue-50 text-blue-600 border-blue-200', completed: 'bg-green-50 text-green-600 border-green-200', cancelled: 'bg-red-50 text-red-600 border-red-200' };

              card.innerHTML = `
                <div class="flex justify-between text-xs">
                  <span class="bg-indigo-600 text-white px-2 py-0.5 rounded font-bold">№${order.id}</span>
                  <span class="text-gray-400">${new Date(order.createdAt).toLocaleString('uk-UA')}</span>
                </div>
                <div class="bg-indigo-50 p-3 rounded-xl text-xs space-y-1 border border-indigo-100">
                  <p><b>Покупець:</b> ${order.buyerName}</p>
                  <p><b>Телефон:</b> <a href="tel:${order.buyerPhone}" class="text-indigo-600 font-bold font-mono hover:underline">${order.buyerPhone}</a></p>
                </div>
                <div class="text-xs bg-white p-3 rounded-xl border font-mono">
                  ${itemsHtml}
                  <p class="text-[11px] pt-2 text-gray-500">📐 Параметри: ${order.specifications?.size || 'Стандарт'} | ${order.specifications?.material || 'Полотно'}</p>
                  <p class="text-[11px] text-gray-500">💬 Нотатки: ${order.specifications?.comment || 'Немає'}</p>
                  ${imageLinkHtml}
                </div>
                <div class="flex justify-between items-center pt-2 border-t">
                  <select onchange="updateStatus('${order.id}', this.value)" class="text-xs p-1.5 rounded-lg border outline-none font-semibold ${statusColors[order.status] || ''}">
                    <option value="pending" ${order.status === 'pending' ? 'selected' : ''}>⏳ Нове</option>
                    <option value="processing" ${order.status === 'processing' ? 'selected' : ''}>🛠️ Обробка</option>
                    <option value="completed" ${order.status === 'completed' ? 'selected' : ''}>✅ Виконано</option>
                    <option value="cancelled" ${order.status === 'cancelled' ? 'selected' : ''}>❌ Скасовано</option>
                  </select>
                  <span class="font-black text-indigo-600">${order.totalPrice} грн</span>
                </div>
              `;
              ordersList.appendChild(card);
            });
          }
        } catch (e) { ordersList.innerHTML = `<p class="text-red-500">Помилка зчитування бази.</p>`; }
      };

      window.updateStatus = async (id, status) => {
        const token = localStorage.getItem("adminToken");
        const res = await fetch(`/api/admin/orders/${id}/status`, {
          method: "PUT",
          headers: { "Content-Type": "application/json", "Authorization": `Bearer ${token}` },
          body: JSON.stringify({ status })
        });
        if (res.ok) loadOrders();
      };

      document.getElementById("form-admin-login").addEventListener("submit", async (e) => {
        e.preventDefault();
        const res = await fetch("/api/auth/admin-login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ login: document.getElementById("admin-username").value.trim(), password: document.getElementById("admin-password").value })
        });
        const data = await res.json();
        if (res.ok) { localStorage.setItem("adminToken", data.token); checkAuth(); } else alert(data.msg);
      });

      document.getElementById("form-add-painting").addEventListener("submit", async (e) => {
        e.preventDefault();
        const token = localStorage.getItem("adminToken");
        const res = await fetch("/api/paintings/add", {
          method: "POST",
          headers: { "Content-Type": "application/json", "Authorization": `Bearer ${token}` },
          body: JSON.stringify({
            title: document.getElementById("title").value.trim(),
            price: document.getElementById("price").value,
            imageUrl: document.getElementById("imageUrl").value.trim(),
            description: document.getElementById("description").value.trim()
          })
        });
        if (res.ok) { alert((await res.json()).msg); document.getElementById("form-add-painting").reset(); }
      });

      document.getElementById("btn-admin-logout").addEventListener("click", () => { localStorage.removeItem("adminToken"); checkAuth(); });
      checkAuth();
    });
  </script>
</body>
</html>
