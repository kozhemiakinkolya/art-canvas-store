<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Панель адміністратора | ArtCanvas</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-800 flex flex-col min-h-screen">

  <header class="bg-white shadow-md">
    <div class="container mx-auto px-6 py-4 flex justify-between items-center">
      <a href="index.html" class="text-2xl font-bold text-indigo-600 tracking-wide">ArtCanvas <span class="text-xs bg-red-100 text-red-600 px-2 py-1 rounded ml-1">Admin</span></a>
      <nav class="space-x-6 font-medium">
        <a href="index.html" class="text-gray-600 hover:text-indigo-600">На головну сайту</a>
        <a href="gallery.html" class="text-gray-600 hover:text-indigo-600">Перейти в Галерею</a>
      </nav>
    </div>
  </header>

  <div id="admin-login-zone" class="flex-grow flex items-center justify-center p-6">
    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border border-gray-100">
      <div class="text-center mb-6">
        <h2 class="text-2xl font-black text-gray-900">Вхід в панель модератора</h2>
        <p class="text-sm text-gray-500 mt-1">Введіть дані для перегляду замовлень</p>
      </div>
      <form id="form-admin-login" class="space-y-4">
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1">Логін</label>
          <input type="text" id="admin-username" required class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl outline-none">
        </div>
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1">Пароль</label>
          <input type="password" id="admin-password" required class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl outline-none">
        </div>
        <button type="submit" class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-3 rounded-xl transition shadow">Увійти</button>
      </form>
    </div>
  </div>

  <main id="admin-content-zone" class="container mx-auto px-6 py-12 flex-grow hidden space-y-12">
    
    <div class="bg-indigo-900 text-white p-8 rounded-3xl shadow-xl flex justify-between items-center">
      <div>
        <h1 class="text-3xl font-black">Панель керування ArtCanvas</h1>
        <p class="text-indigo-200 text-sm mt-1">Моніторинг замовлень та додавання нових товарів</p>
      </div>
      <button id="btn-admin-logout" class="bg-red-600 hover:bg-red-700 text-white text-xs font-bold px-4 py-2 rounded-xl transition">ВИЙТИ</button>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
      
      <div class="lg:col-span-2 bg-white p-8 rounded-3xl shadow-xl border border-gray-100">
        <h2 class="text-2xl font-black text-gray-900 mb-6 flex items-center gap-2">
          📥 Сповіщення про замовлення 
          <span id="orders-count" class="text-xs bg-indigo-100 text-indigo-600 px-2 py-1 rounded-full">0</span>
        </h2>
        
        <div id="orders-list" class="space-y-4 max-h-[650px] overflow-y-auto pr-2">
          <p class="text-gray-400 text-center py-6">Завантаження нових замовлень...</p>
        </div>
      </div>

      <div class="bg-white p-8 rounded-3xl shadow-xl border border-gray-100 h-fit">
        <h2 class="text-2xl font-black text-gray-900 mb-6">➕ Додати картину</h2>
        
        <form id="form-add-painting" class="space-y-4">
          <div>
            <label class="block text-xs font-bold text-gray-500 mb-1 uppercase">Назва</label>
            <input type="text" id="title" required class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl outline-none text-sm">
          </div>
          <div>
            <label class="block text-xs font-bold text-gray-500 mb-1 uppercase">Ціна (грн)</label>
            <input type="number" id="price" required class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl outline-none text-sm">
          </div>
          <div>
            <label class="block text-xs font-bold text-gray-500 mb-1 uppercase">URL Картинки</label>
            <input type="url" id="imageUrl" required class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl outline-none text-xs font-mono">
          </div>
          <div>
            <label class="block text-xs font-bold text-gray-500 mb-1 uppercase">Опис</label>
            <textarea id="description" rows="2" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl text-sm outline-none"></textarea>
          </div>
          <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-xl transition text-sm">Опублікувати</button>
        </form>
      </div>

    </div>
  </main>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const loginZone = document.getElementById("admin-login-zone");
      const contentZone = document.getElementById("admin-content-zone");
      const ordersList = document.getElementById("orders-list");
      const ordersCount = document.getElementById("orders-count");

      const checkAuthAndLoad = async () => {
        const token = localStorage.getItem("adminToken");
        if (token) {
          loginZone.classList.add("hidden");
          contentZone.classList.remove("hidden");
          await loadAdminOrders();
        } else {
          loginZone.classList.remove("hidden");
          contentZone.classList.add("hidden");
        }
      };

      const loadAdminOrders = async () => {
        const token = localStorage.getItem("adminToken");
        try {
          const response = await fetch("/api/admin/orders", {
            headers: { "Authorization": `Bearer ${token}` }
          });
          const orders = await response.json();

          if (response.ok) {
            ordersCount.innerText = orders.length;
            ordersList.innerHTML = "";

            if (orders.length === 0) {
              ordersList.innerHTML = `<p class="text-center text-gray-400 py-12">Нових замовлень поки немає.</p>`;
              return;
            }

            orders.reverse().forEach(order => {
              const orderCard = document.createElement("div");
              orderCard.className = "p-5 bg-gray-50 rounded-2xl border border-gray-200 space-y-3 relative hover:border-indigo-300 transition";
              
              let itemsText = order.items && order.items.length > 0 
                ? order.items.map(i => `• ${i.title} (${i.price} грн)`).join("<br>")
                : "Індивідуальний макет (фото / редактор)";

              const statusColors = {
                'pending': 'text-yellow-600 bg-yellow-50 border-yellow-200',
                'processing': 'text-blue-600 bg-blue-50 border-blue-200',
                'completed': 'text-green-600 bg-green-50 border-green-200',
                'cancelled': 'text-red-600 bg-red-50 border-red-200'
              };
              const currentStatusColor = statusColors[order.status] || 'text-gray-600 bg-gray-50';

              orderCard.innerHTML = `
                <div class="flex justify-between items-center">
                  <span class="text-xs bg-indigo-600 text-white px-2 py-1 rounded font-bold">ЗАМОВЛЕННЯ №${order.id}</span>
                  <span class="text-xs text-gray-400">${new Date(order.createdAt).toLocaleString('uk-UA')}</span>
                </div>

                <div class="bg-indigo-50 p-3 rounded-xl border border-indigo-100 text-xs text-gray-700">
                  <p class="font-bold text-indigo-900 uppercase tracking-wide text-[10px] mb-1">👤 Контакти замовника:</p>
                  <p><b>Ім'я:</b> ${order.buyerName}</p>
                  <p><b>Email:</b> <a href="mailto:${order.buyerEmail}" class="text-indigo-600 hover:underline font-mono">${order.buyerEmail}</a></p>
                </div>

                <div class="text-sm text-gray-700 space-y-1">
                  <p class="font-bold text-gray-900">Склад замовлення:</p>
                  <p class="text-gray-600 bg-white p-2.5 rounded-lg border border-gray-100 font-mono text-xs">${itemsText}</p>
                  <p class="pt-1">📐 <b>Параметри:</b> ${order.specifications?.size || 'Стандарт'} | ${order.specifications?.material || 'Полотно'}</p>
                  ${order.specifications?.comment ? `<p class="text-xs bg-amber-50 p-2 rounded border border-amber-100 text-amber-800">💬 <b>Коментар:</b> "${order.specifications.comment}"</p>` : ''}
                </div>

                <div class="pt-3 border-t border-gray-200 flex flex-wrap justify-between items-center gap-3">
                  <div class="flex items-center space-x-2">
                    <label class="text-xs font-bold text-gray-500 uppercase">Статус:</label>
                    <select onchange="updateOrderStatus('${order.id}', this.value)" class="text-xs p-1.5 rounded-lg border outline-none font-semibold transition ${currentStatusColor}">
                      <option value="pending" ${order.status === 'pending' ? 'selected' : ''}>⏳ Нове (Очікування)</option>
                      <option value="processing" ${order.status === 'processing' ? 'selected' : ''}>🛠️ В обробці</option>
                      <option value="completed" ${order.status === 'completed' ? 'selected' : ''}>✅ Виконано</option>
                      <option value="cancelled" ${order.status === 'cancelled' ? 'selected' : ''}>❌ Скасовано</option>
                    </select>
                  </div>
                  <span class="text-lg font-black text-indigo-600">${order.totalPrice} грн</span>
                </div>
              `;
              ordersList.appendChild(orderCard);
            });
          }
        } catch (err) {
          ordersList.innerHTML = `<p class="text-center text-red-500 py-6">Не вдалося завантажити сповіщення.</p>`;
        }
      };

      window.updateOrderStatus = async (orderId, newStatus) => {
        const token = localStorage.getItem("adminToken");
        try {
          const response = await fetch(`/api/admin/orders/${orderId}/status`, {
            method: "PUT",
            headers: {
              "Content-Type": "application/json",
              "Authorization": `Bearer ${token}`
            },
            body: JSON.stringify({ status: newStatus })
          });
          const data = await response.json();
          if (response.ok) {
            alert(data.msg);
            loadAdminOrders();
          } else {
            alert(data.msg || "Не вдалося змінити статус.");
          }
        } catch (err) {
          alert("Помилка зв'язку з сервером.");
        }
      };

      checkAuthAndLoad();

      document.getElementById("form-admin-login").addEventListener("submit", async (e) => {
        e.preventDefault();
        const login = document.getElementById("admin-username").value.trim();
        const password = document.getElementById("admin-password").value;

        const response = await fetch("/api/auth/admin-login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ login, password })
        });
        const data = await response.json();
        if (response.ok) {
          localStorage.setItem("adminToken", data.token);
          checkAuthAndLoad();
        } else {
          alert(data.msg);
        }
      });

      document.getElementById("form-add-painting").addEventListener("submit", async (e) => {
        e.preventDefault();
        const token = localStorage.getItem("adminToken");
        const bodyData = {
          title: document.getElementById("title").value.trim(),
          price: document.getElementById("price").value,
          imageUrl: document.getElementById("imageUrl").value.trim(),
          description: document.getElementById("description").value.trim()
        };

        const response = await fetch("/api/paintings/add", {
          method: "POST",
          headers: { "Content-Type": "application/json", "Authorization": `Bearer ${token}` },
          body: JSON.stringify(bodyData)
        });
        const data = await response.json();
        if (response.ok) {
          alert(data.msg);
          document.getElementById("form-add-painting").reset();
        } else {
          alert(data.msg);
        }
      });

      document.getElementById("btn-admin-logout").addEventListener("click", () => {
        localStorage.removeItem("adminToken");
        checkAuthAndLoad();
      });
    });
  </script>
</body>
</html>
