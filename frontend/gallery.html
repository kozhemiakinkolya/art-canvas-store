<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Галерея готових картин | ArtCanvas</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">

  <header class="bg-white shadow-sm sticky top-0 z-50">
    <div class="container mx-auto px-6 py-4 flex justify-between items-center">
      <a href="index.html" class="text-2xl font-black text-indigo-600 tracking-wider flex-shrink-0">ArtCanvas</a>
      <nav class="hidden md:flex space-x-6 font-medium text-gray-600 mx-4">
        <a href="index.html" class="hover:text-indigo-600 transition">Головна</a>
        <a href="gallery.html" class="text-indigo-600 font-bold">Галерея картин</a>
        <a href="constructor.html" class="hover:text-indigo-600 transition">Створити картину</a>
        <a href="admin.html" class="text-red-500 hover:text-red-700 font-bold transition">Панель admin</a>
      </nav>
      <div id="auth-zone" class="flex items-center space-x-4 flex-shrink-0 min-w-[190px] justify-end"></div>
    </div>
  </header>

  <main class="container mx-auto px-6 py-12 space-y-8">
    <h1 class="text-3xl font-black text-gray-900">🖼️ Каталог готових робіт</h1>
    <div id="paintings-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
      <p class="text-gray-400">Синхронізація товарів...</p>
    </div>
  </main>

  <script>
    document.addEventListener("DOMContentLoaded", async () => {
      const grid = document.getElementById("paintings-grid");
      const authZone = document.getElementById("auth-zone");
      const user = localStorage.getItem("user");

      if (user) {
        authZone.innerHTML = `<span class="text-sm font-semibold text-gray-700">👋 Авторизований</span>`;
      } else {
        authZone.innerHTML = `<a href="index.html" class="text-sm font-bold text-indigo-600">🔐 Авторизуватись</a>`;
      }

      try {
        const res = await fetch("/api/paintings");
        const paintings = await res.json();
        grid.innerHTML = paintings.length === 0 ? `<p class="text-gray-400">Каталог порожній.</p>` : "";

        paintings.forEach(item => {
          const card = document.createElement("div");
          card.className = "bg-white rounded-2xl shadow border overflow-hidden p-4 space-y-4";
          card.innerHTML = `
            <img src="${item.imageUrl}" class="w-full h-64 object-cover rounded-xl">
            <div>
              <h3 class="text-xl font-bold">${item.title}</h3>
              <p class="text-sm text-gray-500 mt-1">${item.description || 'Опис відсутній'}</p>
            </div>
            <div class="flex justify-between items-center pt-2">
              <span class="text-xl font-black text-indigo-600">${item.price} грн</span>
              <button onclick="buyItem('${item._id}', '${item.title}', ${item.price})" class="bg-indigo-600 text-white font-bold px-4 py-2 rounded-xl text-sm hover:bg-indigo-700 transition">Купити</button>
            </div>
          `;
          grid.appendChild(card);
        });
      } catch (err) { grid.innerHTML = `<p class="text-red-500">Помилка завантаження товарів.</p>`; }
    });

    window.buyItem = async (id, title, price) => {
      const token = localStorage.getItem("userToken");
      if (!token) return alert("Будь ласка, увійдіть у свій профіль на головній сторінці!");

      const res = await fetch("/api/paintings/order", {
        method: "POST",
        headers: { "Content-Type": "application/json", "Authorization": `Bearer ${token}` },
        body: JSON.stringify({
          orderType: "catalog",
          totalPrice: price,
          items: JSON.stringify([{ id, title, price }]),
          size: "Стандарт",
          material: "Натуральне полотно",
          comment: "Замовлення з каталогу вітрини"
        })
      });
      if (res.ok) alert("🎉 Товар успішно додано в базу адміна!");
    };
  </script>
</body>
</html>
